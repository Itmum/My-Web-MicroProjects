<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quize Game</title>
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quize Time</h1>
            <p>Test Your Knowledge with these fun questions</p>
            <button id="start-btn">Start Quize</button>
        </div>

        <div class="screen" id="quize-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question Goes Here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span>of <span id="total-questions">5</span></p>

                    <p>Score: <span id="score">0</span></p>
                </div>
            </div>
            <div class="answer-container" id="answer-container">
                <!-- answer button will be inserted here from js later -->
            </div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div class="screen" id="result-screen">
            <h1>Quize Result</h1>
            <div class="result-info">
                <p>You Scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
                <div id="result-message">Good Job</div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
